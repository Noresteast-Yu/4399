name: smart_travel_app
description: A smart travel app for subway and high-speed rail navigation.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

 dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  # 状态管理
  provider: ^6.1.2
  # 网络请求
  dio: ^5.4.3+1
  # 地图SDK
  amap_flutter_map: ^3.0.0
  amap_flutter_location: ^3.0.0
  # 权限管理
  permission_handler: ^11.3.1
  # 本地存储
  shared_preferences: ^2.2.2
  # 状态管理
  flutter_bloc: ^8.1.3
  # 动画
  lottie: ^2.7.0
  # 工具库
  intl: ^0.18.1
  # 路由管理
  go_router: ^12.1.3

 dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
